version: "3.9"

services:
  webhook-to-napcat:
    image: ghcr.io/etoile-7/webhook-to-napcat:latest
    container_name: webhook-to-napcat
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "8787"
      WEBHOOK_PATH: "/webhook"
      WEBHOOK_SECRET: ""
      NAPCAT_BASE_URL: "http://host.docker.internal:3001"
      NAPCAT_TOKEN: ""
      NAPCAT_TOKEN_MODE: "header"
      NAPCAT_PRIVATE_QQ: "YOUR_QQ_NUMBER"
      NAPCAT_GROUP_QQ: ""
      NAPCAT_TIMEOUT: "10"
      NAPCAT_RETRIES: "5"
      QQ_CHUNK_SIZE: "280"
      TITLE_PREFIX: "📨"
      INCLUDE_HEADERS: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
