version: "3.9"

services:
  webhook-to-napcat:
    image: ghcr.io/etoile-7/webhook-to-napcat:latest
    container_name: webhook-to-napcat
    pull_policy: always
    restart: unless-stopped

    # 将 webhook 服务端口暴露到宿主机
    ports:
      - "8787:8787"

    environment:
      # 容器内 webhook 服务监听地址
      LISTEN_HOST: "0.0.0.0"

      # 容器内 webhook 服务监听端口
      # 上面的 ports 会把宿主机 8787 映射到这里
      LISTEN_PORT: "8787"

      # webhook 路径，例如：http://你的主机:8787/webhook
      WEBHOOK_PATH: "/webhook"

      # 可选的 webhook 密钥；留空表示不启用校验
      WEBHOOK_SECRET: ""

      # NapCat OneBot v11 HTTP API 地址
      # 如果 NapCat 跑在宿主机上，一般保留 host.docker.internal 即可
      # 如果不是，请改成真实的主机/IP 和端口
      NAPCAT_BASE_URL: "http://host.docker.internal:3001"

      # 可选的 NapCat token；如果没开鉴权就留空
      NAPCAT_TOKEN: ""

      # token 传递方式：header 或 query
      NAPCAT_TOKEN_MODE: "header"

      # 私聊和群聊二选一：
      # - 私聊：填写 NAPCAT_PRIVATE_QQ
      # - 群聊：填写 NAPCAT_GROUP_QQ
      NAPCAT_PRIVATE_QQ: "YOUR_QQ_NUMBER"
      NAPCAT_GROUP_QQ: ""

      # 调用 NapCat HTTP API 时的超时和重试次数
      NAPCAT_TIMEOUT: "10"
      NAPCAT_RETRIES: "5"

      # 规则文件路径（容器内）；用于按模板匹配不同 webhook 的输出格式
      WEBHOOK_RULES_PATH: "/app/rules.json"

      # 消息日志目录（容器内），会把每次 webhook 请求/转发结果写成 JSONL
      WEBHOOK_LOG_DIR: "/logs"

      # 长消息拆分时，单条 QQ 消息的最大长度
      QQ_CHUNK_SIZE: "280"

      # 转发到 QQ 时显示的标题前缀
      TITLE_PREFIX: "📨"

      # 是否在转发消息中附带部分请求头信息
      INCLUDE_HEADERS: "1"

    volumes:
      # 将规则模板文件挂载进容器；后续改规则只需要编辑这个文件
      - "./rules.json:/app/rules.json:ro"
      # 将消息日志持久化到宿主机
      - "/opt/WebhookToNapcat/logs:/logs"

    extra_hosts:
      # 让容器可以访问宿主机上运行的服务
      - "host.docker.internal:host-gateway"
